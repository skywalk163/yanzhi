name: 言知 CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest pytest-cov

      - name: 清理字节码缓存
        run: |
          find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true

      - name: 运行单元测试
        run: |
          python -m pytest tests/unit/ -v --tb=short --cov=yanzhi --cov-report=term-missing

      - name: 运行端到端测试
        run: |
          python -m pytest tests/unit/compiler/test_full_pipeline.py -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: 代码风格检查（非阻塞）
        run: |
          flake8 src/yanzhi/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
          flake8 src/yanzhi/ --count --exit-zero --max-complexity=15 --max-line-length=127 --statistics
